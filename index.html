<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>KA3</title>
	<link rel="stylesheet" href="style.css">
</head>

<script defer src="script.js"></script>
<body>
	<header>
		<div class="head-box">
			<div class="container">
				<h3>Калькулятор</h3>
				<div class="item">
					<label for="requiredValue">Введите необходимое значение %</label>
					<input type="numb" id="requiredValue" placeholder="знак % не писать!">
				</div>
				<div class="item">
					<label for="measuredМValue">Введите измеренное значение в СМ</label>
					<input type="numb" id="measuredМValue">
				</div>
				<div class="item">
					<label for="measuredМValueCategoty">Введите измеренное значение всей категории СМ</label>
					<input type="numb" id="measuredМValueCategoty">
				</div>
				<div class="item itemBorder">
					<label for="result">Результат</label>
					<input type="numb" id="result">
				</div>

			</div>
		</div>
	</header>
</body>
</html>
